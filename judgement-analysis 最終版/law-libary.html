          <h1>案件查詢</h1>
          <form>
            <div class="form-row">
              <label for="start-date" style="font-weight: bolder"
                >裁判期間</label
              >
              <select id="start-year" name="start-year">
                <option value="">選擇年 (西元)</option>
                <option value="2022">2022年</option>
                <option value="2023">2023年</option>
                <option value="2024">2024年</option>
              </select>
              <select id="start-month" name="start-month">
                <option value="">選擇月</option>
                <option value="1">1月</option>
                <option value="2">2月</option>
                <option value="3">3月</option>
                <option value="4">4月</option>
                <option value="5">5月</option>
                <option value="6">6月</option>
                <option value="7">7月</option>
                <option value="8">8月</option>
                <option value="9">9月</option>
                <option value="10">10月</option>
                <option value="11">11月</option>
                <option value="12">12月</option>
              </select>
              <select id="start-day" name="start-day">
                <option value="">選擇日</option>
              </select>
              <script>
                document.addEventListener("DOMContentLoaded", function () {
                const startYear = document.getElementById("start-year");
                const startMonth = document.getElementById("start-month");
                const startDay = document.getElementById("start-day");

                startYear.addEventListener("change", updateDays);
                startMonth.addEventListener("change", updateDays);

                function updateDays() {
                    const year = parseInt(startYear.value);
                    const month = parseInt(startMonth.value);
                    let daysInMonth;

                    if (month === 2) {

      async function generateExamples(lawContent) {
        const prompt =
          "請以台灣的風俗民情給我一個關於該法條的可能發生的情境,並且回答時包含,情境例子:";
        const examplePrompt = `法條內容:\n${lawContent}\n\n${prompt}`; // Use backticks for template literal

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              contents: [{ parts: [{ text: examplePrompt }] }],
            }),
          });

          if (!response.ok) {
            const errorMessage = await response.text();
            throw new Error("分析失敗：" + errorMessage);
          }

          const data = await response.json();
          const result = data.candidates[0].content.parts[0].text;

          return result.replace(/\*\*/g, "").replace(/\*/g, "");
        } catch (error) {
          console.error("Error:", error);
          return "分析失敗，請稍後再試。";
        }
      }

        });

      function toggleDropdown() {
        const dropdownMenu = document.getElementById("dropdown-menu");
        const overlay = document.getElementById("overlay");
        const userNameElement = document.getElementById("user-name");

        if (dropdownMenu.classList.contains("show")) {
          dropdownMenu.classList.remove("show");
          dropdownMenu.classList.add("hide");
          overlay.classList.remove("show");

          if (userNameElement) {
            userNameElement.classList.remove("hidden");
          }
        } else {
          dropdownMenu.classList.remove("hide");
          dropdownMenu.classList.add("show");
          overlay.classList.add("show");

          if (userNameElement) {
            userNameElement.classList.add("hidden");
          }
        }
      }

      document.getElementById("overlay").addEventListener("click", function () {
        const dropdownMenu = document.getElementById("dropdown-menu");
        const overlay = document.getElementById("overlay");
        const userNameElement = document.getElementById("user-name");
        dropdownMenu.classList.remove("show");
        dropdownMenu.classList.add("hide");
        overlay.classList.remove("show");
        if (userNameElement) {
          userNameElement.classList.remove("hidden");
        }
      });

      function checkLoginStatus() {
        console.log("Checking login status...");

        const isLoggedIn = localStorage.getItem("isLoggedIn");
        console.log("isLoggedIn:", isLoggedIn);
        console.log(
          "User ID from localStorage:",
          localStorage.getItem("userId")
        );
        const loginButton = document.getElementById("login-button");
        const signupButton = document.getElementById("signup-button");
        const userInfo = document.getElementById("user-info");
        const userAvatar = document.getElementById("user-avatar");
        const dropdownHeader = document.getElementById("dropdown-header");
        const userNameElement = document.getElementById("user-name");

        if (isLoggedIn) {
          if (loginButton) loginButton.style.display = "none";
          if (signupButton) signupButton.style.display = "none";
          if (userInfo) userInfo.style.display = "block";

          const userName = localStorage.getItem("userName");
          const headshotUrl =
            localStorage.getItem("userHeadshot") || "images/profile.png";
          userAvatar.style.backgroundImage = `url('${headshotUrl}')`;
          if (userNameElement) {
            userNameElement.textContent = userName;
            userNameElement.style.width = `${userNameElement.scrollWidth}px`;
          }
          if (dropdownHeader) dropdownHeader.textContent = `您好，${userName}`;
        } else {
          if (loginButton) loginButton.style.display = "inline-block";
          if (signupButton) signupButton.style.display = "inline-block";
          if (userInfo) userInfo.style.display = "none";
          if (userAvatar) userAvatar.style.display = "none";
        }
      }

      window.addEventListener("load", checkLoginStatus);

      function logout() {
        console.log("logout");
        localStorage.removeItem("isLoggedIn");
        localStorage.removeItem("userName");
        localStorage.removeItem("userHeadshot");
        localStorage.removeItem("userId");
        window.location.reload();
      }

      document.addEventListener("DOMContentLoaded", (event) => {
        const logoutButton = document.getElementById("logout-button");

        if (logoutButton) {
          logoutButton.addEventListener("click", (event) => {
            event.preventDefault();
            logout();
          });
        }
      });

      document.addEventListener("DOMContentLoaded", (event) => {
        const accountSettingButton = document.getElementById(
          "accountSettingButton"
        );

        if (accountSettingButton) {
          accountSettingButton.addEventListener("click", (event) => {
            window.location.href = "accountSetting.html";
          });
        }
      });

      document.addEventListener("DOMContentLoaded", (event) => {
        const historyButton = document.getElementById("historyButton");
        if (historyButton) {
          historyButton.addEventListener("click", (event) => {
            window.location.href = "historicalRecord.html";
          });
        }
      });
      
      document.addEventListener("DOMContentLoaded", (event) => {
        const switchAccountButton = document.getElementById(
          "switchAccountButton"
        );
        const dropdownMenu = document.getElementById("dropdown-menu");
        const overlay = document.getElementById("overlay");
        const btnLogin = document.querySelector(".left");

        if (switchAccountButton) {
          switchAccountButton.addEventListener("click", (event) => {
            if (dropdownMenu) {
              dropdownMenu.classList.remove("show");
              dropdownMenu.classList.add("hide");
            }
            if (overlay) {
              overlay.classList.remove("show");
            }

            setTimeout(() => {
              if (btnLogin) {
                btnLogin.click();
              }
            }, 100);
          });
        }

        btnLogin.addEventListener("click", () => {
          animation.style.display = "block";
          slider.style.display = "flex";
          slider.style.animation = "fadeInFromBottom 0.5s ease-out forwards";
          slider2.style.display = "none";
          disableScroll();
        });
      });
    </script>
    <script>
      function showLoading() {
        document.getElementById("loading-overlay").style.display = "flex";
      }

      function hideLoading() {
        document.getElementById("loading-overlay").style.display = "none";
      }
    </script>
    <script>
      window.addEventListener("load", checkLoginStatus);
    </script>
    <script></script>
    <script src="./app2.js"></script>
  </body>
</html>
