    <script>
      const API_KEY = "AIzaSyAKIV3ZOU9fY3tkcoVdArKZ3udh7J07SD0";
      const API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

      function handleFileUpload() {
        const input = document.getElementById("pdfInput");
        const fileName = document.getElementById("fileName");

        if (input.files && input.files[0]) {

      async function analyzeText() {
        showLoading();
        const userId = localStorage.getItem("userId");
        try {
          const caseDetails = document.getElementById("caseDetails").value;
          const prompt =
            "現在你是一名中華民國的專業法官或律師，請分析上述案件並給出你的見解，並且一定要用繁體中文詳細解釋為什麼會有這樣的判決結果或如果發生這樣的事件法官可能會如何審理。";
          const fullText = caseDetails + "\n\n" + prompt;

          const response = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              contents: [
                {
                  parts: [
                    {
                      text: fullText,
                    },
                  ],
                },
              ],
            }),
          });

          const data = await response.json();

          if (
            data &&
            data.candidates &&
            data.candidates[0] &&
            data.candidates[0].content &&
            data.candidates[0].content.parts
          ) {
            const geminiText = data.candidates[0].content.parts[0].text;
            sessionStorage.setItem("geminiText", geminiText);
            sessionStorage.setItem("caseDetails", caseDetails);

            await promptJudgeName(caseDetails);

            if (userId != null) {
              const historyResponse = await fetch(
                "http://localhost:3000/save-history",
                {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                  },
                  body: JSON.stringify({
                    userId: userId,
                    fullPdfText: caseDetails,
                    geminiText: geminiText,
                  }),
                }
              );

              if (!historyResponse.ok) {
                alert("Failed to save history.");
              }
            }
          } else {
            console.error("Error: 從 API 收到意外的回應結構");
            alert("分析失敗，請稍後再試");
          }
        } finally {
          hideLoading();
        }
      }

      async function analyzePDF() {
        showLoading();
        const fileInput = document.getElementById("pdfInput");
        const file = fileInput.files[0];
        const userId = localStorage.getItem("userId");

        if (!file) {
          alert("請選擇一個PDF文件進行分析。");
          hideLoading();
          return;
        }

        const reader = new FileReader();
        reader.onload = async function (event) {
          try {
            const arrayBuffer = event.target.result;
            const pdfData = new Uint8Array(arrayBuffer);
            const loadingTask = pdfjsLib.getDocument({ data: pdfData });

            const pdf = await loadingTask.promise;
            const numPages = pdf.numPages;
            let fullPdfText = "";

            for (let i = 1; i <= numPages; i++) {
              const page = await pdf.getPage(i);
              const textContent = await page.getTextContent();
              const pageText = textContent.items
                .map((item) => item.str)
                .join(" ");
              fullPdfText += pageText + "\n";
            }

            const prompt =
              "現在你是一名中華民國的專業法官或律師，請分析下述案件並給出你的見解，並且一定要用繁體中文詳細解釋為什麼會有這樣的判決結果或如果發生這樣的事件法官可能會如何審理。";
            const fullText = prompt + "\n\n" + fullPdfText;

            const response = await fetch(API_URL, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                contents: [
                  {
                    parts: [
                      {
                        text: fullText,
                      },
                    ],
                  },
                ],
              }),
            });

            const data = await response.json();

            if (
              data &&
              data.candidates &&
              data.candidates[0] &&
              data.candidates[0].content &&
              data.candidates[0].content.parts
            ) {
              const geminiText = data.candidates[0].content.parts[0].text;
              sessionStorage.setItem("geminiText", geminiText);
              sessionStorage.setItem("pdfText", fullPdfText);

              await promptJudgeName(fullPdfText);

              if (userId != null) {
                const historyResponse = await fetch(
                  "http://localhost:3000/save-history",
                  {
                    method: "POST",
                    headers: {
                      "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                      userId: userId,
                      fullPdfText: fullPdfText,
                      geminiText: geminiText,
                    }),
                  }
                );

                if (!historyResponse.ok) {
                  alert("Failed to save history.");
                }
              }
            } else {
              console.error("Error: 從 API 收到意外的回應結構");
              alert("分析失敗，請稍後再試");
            }
          } finally {
            hideLoading();
          }
        };

        reader.readAsArrayBuffer(file);
      }

        const fullTextWithJudgePrompt = caseDetails + "\n\n" + judgePrompt;

        let response;
        let judgeData;
        try {
          response = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              contents: [
                {
                  parts: [
                    {
                      text: fullTextWithJudgePrompt,
                    },
                  ],
                },
              ],
            }),
          });

          if (!response.ok) {
            throw new Error(`HTTP error! Status: ${response.status}`);

          judgeData = await response.json();

          if (
            judgeData &&
            judgeData.candidates &&
            judgeData.candidates.length > 0 &&
            judgeData.candidates[0].content &&

            judgeData.candidates[0].content.parts.length > 0

    <script>
      function toggleDropdown() {
        const dropdownMenu = document.getElementById("dropdown-menu");
        const overlay = document.getElementById("overlay");

        if (dropdownMenu.classList.contains("show")) {
          dropdownMenu.classList.remove("show");
          dropdownMenu.classList.add("hide");
          overlay.classList.remove("show");
        } else {
          dropdownMenu.classList.remove("hide");
          dropdownMenu.classList.add("show");
          overlay.classList.add("show");
        }
      }
      document.getElementById("overlay").addEventListener("click", function () {

            userNameElement.classList.remove("hidden");

          dropdownMenu.classList.remove("hide");
