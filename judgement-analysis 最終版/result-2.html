      function toggleDropdown() {

        if (dropdownMenu.classList.contains("show")) {
          dropdownMenu.classList.remove("show");
          dropdownMenu.classList.add("hide");
          overlay.classList.remove("show");
        } else {
          dropdownMenu.classList.remove("hide");
          dropdownMenu.classList.add("show");
          overlay.classList.add("show");
        }
      }

      document.getElementById("overlay").addEventListener("click", function () {
        const dropdownMenu = document.getElementById("dropdown-menu");

        dropdownMenu.classList.remove("show");
        dropdownMenu.classList.add("hide");

      function goBack() {
        window.history.back();
      }
      let originalOrder = [];

      function initializeCaseList() {
        const caseList = document.getElementById("caseList");
        const cases = Array.from(caseList.getElementsByClassName("case-item"));
        originalOrder = cases.slice();
      }

      function sortCases(criteria) {
        const caseList = document.getElementById("caseList");
        const cases = Array.from(caseList.getElementsByClassName("case-item"));

        if (criteria === "default") {
          caseList.innerHTML = "";
          originalOrder.forEach((caseItem) => caseList.appendChild(caseItem));
        } else {
          cases.sort((a, b) => {
            const dateA = extractDate(a);
            const dateB = extractDate(b);

            if (criteria === "date-asc") {
              return dateA - dateB;
            } else if (criteria === "date-desc") {
              return dateB - dateA;
            }
            return 0;
          });

          caseList.innerHTML = "";
          cases.forEach((caseItem) => caseList.appendChild(caseItem));
        }
      }

      function extractDate(caseItem) {
        const innerHTML = caseItem.innerHTML;

        const dateMatch = innerHTML.match(
          /<strong>裁判日期:<\/strong>\s*([0-9-]+)/
        );

        if (dateMatch && dateMatch[1]) {
          return new Date(dateMatch[1].trim());
        }

        console.error("裁判日期 not found in button innerHTML:", innerHTML);
        return new Date(0);
      }

      document.addEventListener("DOMContentLoaded", function () {
            const geminiText = sessionStorage.getItem("geminiText");
            const caseDetails1 = sessionStorage.getItem("caseDetails1");
            const caseDetails2 = sessionStorage.getItem("caseDetails2");

            let formattedText = geminiText
                ? geminiText.replace(/\#\#/g, "🧑🏻‍⚖️").replace(/\*\*/g, "").replace(/\*/g, "•").replace(/\n/g, "<br>")
                : '';

            receiveGeminiResponse(formattedText);
        });

        function displayGeminiTextWithFadeIn(text) {
            const container = document.getElementById('geminiText');
            container.innerHTML = '';

            if (typeof text !== 'string') {
                console.error("Gemini 回傳的內容不是字符串：", text);
                return;
            }

            const lines = text.split(/<br\s*\/?>/);

            lines.forEach((line, index) => {
                const lineElement = document.createElement('div');
                lineElement.innerHTML = line;
                lineElement.classList.add('fade-in-line');
                lineElement.style.animationDelay = `${index * 0.1}s`;
                container.appendChild(lineElement);
            });
        }

        function receiveGeminiResponse(geminiText) {
            displayGeminiTextWithFadeIn(geminiText);
        }

      document.addEventListener("DOMContentLoaded", function () {
        const geminiText = sessionStorage.getItem("geminiText");
        const caseDetails1 = sessionStorage.getItem("caseDetails1");
        const caseDetails2 = sessionStorage.getItem("caseDetails2");
        const sortSelect = document.getElementById("sort-select");

        const judgeName = localStorage.getItem("judgeName");
        console.log("Judge Name:", judgeName);

        function fetchCases() {
          const loadingMessage = document.getElementById("loadingMessage");
          loadingMessage.style.display = "block";
          fetch(`http://localhost:3000/getCases?judgeName=${judgeName}`)
            .then((response) => response.json())
            .then((data) => {
              console.log("Fetched Cases:", data);
              const caseList = document.getElementById("caseList");
              caseList.innerHTML = "";
              caseList.appendChild(loadingMessage);

              if (data.length === 0) {
                console.log("數據庫數據為空，進行重試...");
                setTimeout(fetchCases, 2000);
                return;
              }
              sortCases(document.getElementById("sortCriteria").value);
              const ids = new Set();
              data.forEach((caseItem) => {
                if (ids.has(caseItem.id)) {
                  console.warn(
                    `Duplicate ID detected: ${caseItem.id}`,
                    caseItem
                  );
                }
                ids.add(caseItem.id);
              });

              data.forEach((caseItem, index) => {
                const button = document.createElement("button");
                button.classList.add("case-item");
                if (index >= 4) {
                  button.classList.add("hidden");
                }
                initializeCaseList();
                function truncateText(text, maxLength) {
                  return text.length > maxLength
                    ? `${text.substring(0, maxLength)}...`
                    : text;
                }
                const 法官姓名 = truncateText(caseItem.法官姓名, 16);
                const 內文 = truncateText(caseItem.內文, 17);

                button.innerHTML = `<strong>裁判案由:</strong> ${caseItem.裁判案由}<br>
                         <strong>法官姓名:</strong> ${法官姓名}<br>
                         <strong>裁判日期:</strong> ${caseItem.裁判日期}<br>
                         <strong>內文:</strong> ${內文}`;

                document.querySelector("#caseList").appendChild(button);

                console.log(`Storing case with ID: ${caseItem.id}`, caseItem);
                sessionStorage.setItem(
                  `case_${caseItem.id}`,
                  JSON.stringify(caseItem)
                );

                caseList.appendChild(button);

                button.addEventListener("click", () => {
                  console.log(`Button clicked for case ID: ${caseItem.id}`);
                  fetchCasesAnalysis(caseItem.id);
                });
              });
              loadingMessage.style.display = "none";
              const fadeEffect = document.getElementById("fadeEffect");
              fadeEffect.innerText = "查看更多";
            })
            .catch((error) => {
              console.error("Error fetching cases:", error);
            });

        async function generateAnalysis(caseData) {
          const prompt =
            "請以案件一為基準並分析以上這兩個相似案件導致判決結果不同的原因，並以台灣現行法學為基準回答。";
          const diffrentResultPrompt = `案件一:\n${geminiText}\n案件二:\n${caseData}\n\n${prompt}`;
          console.log(diffrentResultPrompt);
          try {
            const response = await fetch(API_URL, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                contents: [{ parts: [{ text: diffrentResultPrompt }] }],
              }),
            });

            if (!response.ok) {
              const errorMessage = await response.text();
              throw new Error("分析失敗：" + errorMessage);
            }

            const data = await response.json();
            const analysisResult = data.candidates[0].content.parts[0].text;

            // 返回分析結果
            return analysisResult
              .replace(/\#\#/g, "⚖️")
              .replace(/\*\*/g, "")
              .replace(/\*/g, "•")
              .replace(/\n/g, "<br>");
          } catch (error) {
            console.error("Error:", error);
            return "分析失敗，請稍後再試。";
          }
        }

          console.log(`Fetching analysis for case ID: ${caseId}`);

            document.body.appendChild(modal);

            const analysisResult = await generateAnalysis(caseData.內文);

                document.body.removeChild(modal);

          .addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
              sendQuestion();
            }
          });

        async function sendQuestion() {
          const loadingIndicator = document.getElementById("loadingIndicator");
          const question = document
            .getElementById("user-question")
            .value.trim();
          const caseDetails1 = sessionStorage.getItem("caseDetails1");
          const caseDetails2 = sessionStorage.getItem("caseDetails2");
          const pdfText = sessionStorage.getItem("pdfText");
          const sendButton = document.getElementById("send-question-button");

          if (question !== "") {
            loadingIndicator.style.display = "block";
            sendButton.classList.add("disabled");
            sendButton.disabled = true;

            try {
              const response = await fetch(API_URL, {
                method: "POST",

                  "Content-Type": "application/json",

                body: JSON.stringify({
                  contents: [
                    {
                      parts: [
                        {

                            caseDetails1 +

                  ],

              if (!response.ok) {
                const errorMessage = await response.text();
                throw new Error("分析失敗：" + errorMessage);

              const data = await response.json();
              const replyText = data.candidates[0].content.parts[0].text;

                document.getElementById("response-container");

              console.error("Error:", error);
              alert("分析失敗，請稍後再試：" + error.message);

              loadingIndicator.style.display = "none";
              sendButton.classList.remove("disabled");

            modalBackground.style.display = "none";

          localStorage.getItem("userId")
        );
        const loginButton = document.getElementById("login-button");
        const signupButton = document.getElementById("signup-button");
        const userInfo = document.getElementById("user-info");
        const userAvatar = document.getElementById("user-avatar");
        const dropdownHeader = document.getElementById("dropdown-header");
        const userNameElement = document.getElementById("user-name");

        if (isLoggedIn) {
          if (loginButton) loginButton.style.display = "none";
          if (signupButton) signupButton.style.display = "none";
          if (userInfo) userInfo.style.display = "block";

          const userName = localStorage.getItem("userName");
          const headshotUrl =
            localStorage.getItem("userHeadshot") || "images/profile.png";
          userAvatar.style.backgroundImage = `url('${headshotUrl}')`;
          if (userNameElement) {
            userNameElement.textContent = userName;
            userNameElement.style.width = `${userNameElement.scrollWidth}px`;
          }
          if (dropdownHeader) dropdownHeader.textContent = `您好，${userName}`;
        } else {
          if (loginButton) loginButton.style.display = "inline-block";
          if (signupButton) signupButton.style.display = "inline-block";
          if (userInfo) userInfo.style.display = "none";
          if (userAvatar) userAvatar.style.display = "none";
        }
      }

      window.addEventListener("load", checkLoginStatus);

      function logout() {
        console.log("logout");
        localStorage.removeItem("isLoggedIn");
        localStorage.removeItem("userName");
        localStorage.removeItem("userHeadshot");
        localStorage.removeItem("userId");
        window.location.reload();
      }

      document.addEventListener("DOMContentLoaded", (event) => {
        const logoutButton = document.getElementById("logout-button");

        if (logoutButton) {
          logoutButton.addEventListener("click", (event) => {
            event.preventDefault();
            logout();
          });
        }
      });

      document.addEventListener("DOMContentLoaded", (event) => {
        const accountSettingButton = document.getElementById(
          "accountSettingButton"
        );

        if (accountSettingButton) {
          accountSettingButton.addEventListener("click", (event) => {
            window.location.href = "accountSetting.html";
          });
        }
      });

      document.addEventListener("DOMContentLoaded", (event) => {
        const historyButton = document.getElementById("historyButton");
        if (historyButton) {
          historyButton.addEventListener("click", (event) => {
            window.location.href = "historicalRecord.html";
          });
        }
      });

      document.addEventListener("DOMContentLoaded", (event) => {
        const switchAccountButton = document.getElementById(
          "switchAccountButton"
        );
        const dropdownMenu = document.getElementById("dropdown-menu");
        const overlay = document.getElementById("overlay");
        const btnLogin = document.querySelector(".left");

        if (switchAccountButton) {
          switchAccountButton.addEventListener("click", (event) => {
            if (dropdownMenu) {
              dropdownMenu.classList.remove("show");
              dropdownMenu.classList.add("hide");
            }
            if (overlay) {
              overlay.classList.remove("show");
            }

            setTimeout(() => {
              if (btnLogin) {
                btnLogin.click();
              }
            }, 100);
          });
        }

        btnLogin.addEventListener("click", () => {
          animation.style.display = "block";
          slider.style.display = "flex";
          slider.style.animation = "fadeInFromBottom 0.5s ease-out forwards";
          slider2.style.display = "none";
          disableScroll();
        });
      });
      //判決結果比率
      const judgeName = localStorage.getItem("judgeName");
  if (judgeName) {
      fetch(`http://localhost:3000/getJudgeResults?judgeName=${judgeName}`)
          .then(response => {
              if (!response.ok) {
                  throw new Error('Network response was not ok');
              }
              return response.json();
          })
          .then(data => {
              displayJudgeResults(data);
          })
          .catch(error => {
              console.error('Error fetching judge results:', error);
              alert('無法取得法官審理結果，請稍後再試。');
          });
  }

  function displayJudgeResults(data) {
    const judgeResultsContainer = document.getElementById('judge-results');
    const judgeName = localStorage.getItem("judgeName");
    judgeResultsContainer.innerHTML = '';

    // Title
    const title = document.createElement('h6');
    title.textContent = `各法官針對 ${judgeName} 的判決結果比率`;
    judgeResultsContainer.insertBefore(title, judgeResultsContainer.firstChild);

    // 遍歷每位法官的結果
    data.forEach((result, index) => {
        // 容器
        const judgeResultContainer = document.createElement('div');
        judgeResultContainer.classList.add('judge-results-container');

        // 姓名與innerHTML區塊
        const judgeNameContainer = document.createElement('div');
        judgeNameContainer.classList.add('judge-name-container');
        judgeNameContainer.innerHTML = `<ul><li>${result.judgeName} <br>- 原告方勝訴，被告方敗訴: ${result.winPercentage}%<br>- 原告方敗訴，被告方勝訴: ${result.losePercentage}%</li></ul>`;

        // 環形圖區塊
        const pieChartContainer = document.createElement('div');
        pieChartContainer.classList.add('pie-chart-container');
        const canvas = document.createElement('canvas');
        pieChartContainer.appendChild(canvas);

        // 添加姓名區塊和環形圖區塊到主容器
        judgeResultContainer.appendChild(judgeNameContainer);
        judgeResultContainer.appendChild(pieChartContainer);
        judgeResultsContainer.appendChild(judgeResultContainer);

        // 分隔線
        if (index < data.length - 1) {
            const divider = document.createElement('hr');
            divider.style.border = 'none';
            divider.style.height = '2px';
            divider.style.width = '90%';
            divider.style.opacity = '0.5';
            divider.style.margin = '20px auto';
            divider.style.backgroundColor = 'lightgray';
            judgeResultsContainer.appendChild(divider);
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    
                    entry.target.classList.add('fade-in');

                    
                    const ctx = canvas.getContext('2d');
                    const chart = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: ['原告方勝訴，被告方敗訴', '原告方敗訴，被告方勝訴'],
                            datasets: [{
                                data: [result.winPercentage, result.losePercentage],
                                backgroundColor: ['#36A2EB', '#FF6384'],
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            cutoutPercentage: 50,
                            animation: {
                                duration: 2000,
                                easing: 'easeOutCubic',
                                animateRotate: true,
                                animateScale: true,
                                onComplete: function() {
                                }
                            },
                            plugins: {
                                legend: {
                                    position: 'right',
                                    labels: {
                                        usePointStyle: true,
                                        pointStyle: 'circle',
                                        padding: 15,
                                        font: {
                                            size: 13,
                                            family: 'Arial',
                                            weight: 'normal'
                                        },
                                        color: 'rgba(211, 211, 211, 1)',
                                        boxWidth: 8,
                                        boxHeight: 8
                                    }
                                },
                                tooltip: {
                                    callbacks: {
                                        label: function (tooltipItem) {
                                            return tooltipItem.raw + '%';
                                        }
                                    }
                                }
                            }
                        }
                    });

                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.5 });

        observer.observe(judgeResultContainer);
    });
}

`;
